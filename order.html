    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>

    <nav class="navbar">

        <div class="logo-section">

            <img src=" logo.png"
                 alt="Logo"
                 class="logo">

            <h1>Madras Bakehouse</h1>

        </div>

        <ul class="nav-links">

            <li><a href="index.html">Home</a></li>

            <li><a href="menu.html">Menu</a></li>

            <li><a href="about.html">About</a></li>

        </ul>

        <div class="nav-icons">

            <a href="about.html#contact">
                <i class="bi bi-telephone-fill"></i>
            </a>

            <a href="menu.html">
                <i class="bi bi-cart-fill"></i>
            </a>

        </div>
        <div class="menu-toggle">

    <i class="bi bi-list"></i>

</div>

    </nav>

</header>

<!-- ORDER HERO -->

<section class="order-hero">

    <h2>Let's Prepare Something Delicious</h2>

    <p>
        Tell us where and when you'd like your order delivered.
    </p>

</section>

<!-- ORDER FORM -->

<section class="order-form-section">

<form id="customerForm">

    <div class="form-group">
        <label>Full Name *</label>
        <input type="text"
               id="name"
               required>
    </div>

    <div class="form-group">
        <label>Mobile Number *</label>
        <input type="tel"
               id="mobile"
               required>
    </div>

    <div class="form-group">
        <label>Email Address *</label>
        <input type="email"
               id="email"
               required>
    </div>

    <div class="form-group">
        <label>Delivery Address *</label>
        <textarea id="address"
                  rows="4"
                  required></textarea>
    </div>

    <div class="form-group">
        <label>Delivery Date *</label>
        <input type="date"
               id="date"
               required>
    </div>

    <div class="form-group">
        <label>Preferred Time *</label>
        <input type="time"
               id="time"
               required>
    </div>

    <div class="form-group">

        <label>Occasion</label>

        <select id="occasion">

            <option>Birthday</option>
            <option>Anniversary</option>
            <option>Wedding</option>
            <option>Corporate Event</option>
            <option>Family Gathering</option>
            <option>Other</option>

        </select>

    </div>

    <div class="form-group">

        <label>Special Instructions</label>

        <textarea id="instructions"
                  rows="5"></textarea>

    </div>

    <div class="form-buttons">

        <button type="button"
                class="cancel-btn"
                onclick="window.location.href='index.html'">

            Cancel

        </button>

        <button type="submit"
                class="submit-btn">

            Submit & Pick Your Favorites

        </button>

    </div>

</form>

</section>

<footer>

    <div class="footer-content">

        <h2>Madras Bakehouse</h2>

        <p>
            Freshly baked luxury every day.
        </p>

    </div>

</footer>

<script src="script.js"></script>

</body>
</html>
